<tr id="balance-{symbol}">
    <td>
      {symbol}
    </td>
    <td>
        <input
                type="number"
                name="amount"
                value="{amount}"
                data-hx-post="/api/v1-htmx/balances"
                data-hx-target="#balance-{symbol}"
                data-hx-swap="outerHTML"
                data-hx-trigger="blur"
                data-hx-vals='{"symbol": "{symbol}"}'
        />
    </td>
    <td>
        <button
                data-hx-delete="/api/v1-htmx/balances/{symbol}"
                data-hx-target="#balance-{symbol}"
        >
            Delete
        </button>
    </td>
</tr>
