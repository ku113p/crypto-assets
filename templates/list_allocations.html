<form hx-post='/api/v1-htmx/allocations' hx-target='#allocations-body' hx-swap='afterbegin'>
    <input type='text' name='scheme_name' placeholder='Scheme' required>
    <input type='text' name='symbol' placeholder='Asset Symbol' required>
    <input type='number' step='0.0000000001' name='amount' placeholder='Amount' required>
    <button type='submit'>Add Allocation</button>
</form>

<table>
    <thead>
    <tr>
        <th>Symbol</th>
        <th>Amount</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody id='allocations-body'>
    {rows}
    </tbody>
</table>
