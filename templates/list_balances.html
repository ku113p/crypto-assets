<form data-hx-post='/token/{auth_token}/api/v1-htmx/balances' data-hx-target='#balances-body' data-hx-swap='afterbegin'>
    <input type='text' name='symbol' placeholder='Asset Symbol' required>
    <input type='number' step='0.0000000001' name='amount' placeholder='Amount' required>
    <button type='submit'>Add Balance</button>
</form>

<table>
    <thead>
    <tr>
        <th>Symbol</th>
        <th>Amount</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody id='balances-body'>
    {rows}
    </tbody>
</table>
